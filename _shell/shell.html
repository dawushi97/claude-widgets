<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>{{TITLE}}</title>
<link rel="stylesheet" href="../_shell/tokens.css">
<script>
  /* Theme switcher: ?theme=dark | ?theme=light forces a mode.
     Otherwise the page follows the OS preference (default of color-scheme: light dark). */
  (function () {
    var t = new URLSearchParams(location.search).get('theme');
    if (t === 'dark' || t === 'light') {
      document.documentElement.style.colorScheme = t;
    }
  })();

  /* Polyfills for Claude-runtime-only globals */
  window.sendPrompt = window.sendPrompt || function (text) {
    console.info('[sendPrompt polyfill]', text);
    try { alert('sendPrompt:\n\n' + text); } catch (e) {}
  };
  window.openLink = window.openLink || function (url) {
    // Reject javascript:/data:/vbscript: URIs — only allow http(s)/mailto/tel.
    var safe = /^(https?:|mailto:|tel:)/i;
    if (typeof url !== 'string' || !safe.test(url)) {
      console.warn('[openLink] blocked non-safe URL:', url);
      return;
    }
    window.open(url, '_blank', 'noopener,noreferrer');
  };

  /* Auto-resize: broadcast the actual content height to parent on layout change.
     We measure the content wrapper, NOT body/html (those echo the iframe size
     back via 100vh/100% and create a feedback loop). */
  window.addEventListener('load', function () {
    var wrap = document.getElementById('__widget_root') || document.body;
    var lastH = 0;
    function emit() {
      // getBoundingClientRect().height is layout-accurate and not affected by
      // any "min-height: 100vh" cascading from parent-driven viewport changes.
      var rect = wrap.getBoundingClientRect();
      var h = Math.ceil(rect.height) +
              parseFloat(getComputedStyle(document.body).paddingTop) +
              parseFloat(getComputedStyle(document.body).paddingBottom);
      if (Math.abs(h - lastH) < 2) return;       // ignore sub-pixel jitter
      lastH = h;
      parent.postMessage({ type: 'claude-widget-resize', height: h, src: location.href }, '*');
    }
    new ResizeObserver(emit).observe(wrap);
    document.body.addEventListener('click', function () { setTimeout(emit, 50); }, true);
    emit();
  });
</script>
</head>
<body>
<div id="__widget_root">
<!-- {{WIDGET_START}} -->
{{WIDGET}}
<!-- {{WIDGET_END}} -->
</div>
</body>
</html>
